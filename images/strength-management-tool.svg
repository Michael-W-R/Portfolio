<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#eef1f5"/>

  <!-- Title bar -->
  <rect width="1000" height="64" fill="#1f3a5f"/>
  <text x="24" y="30" fill="#ffffff" font-size="21" font-weight="700">Strength Management Tool</text>
  <text x="24" y="50" fill="#9fb3c8" font-size="12.5">Illustrative dashboard · sample data (no real personnel data)</text>
  <!-- slicers -->
  <g font-size="12" fill="#1f3a5f">
    <rect x="612" y="20" width="112" height="26" rx="4" fill="#ffffff"/><text x="624" y="37">Unit  ▾</text>
    <rect x="732" y="20" width="112" height="26" rx="4" fill="#ffffff"/><text x="744" y="37">As-Of  ▾</text>
    <rect x="852" y="20" width="124" height="26" rx="4" fill="#ffffff"/><text x="864" y="37">Grade  ▾</text>
  </g>

  <!-- KPI cards -->
  <g>
    <g transform="translate(24,80)">
      <rect width="180" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#1f3a5f">1,240</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Authorized</text>
    </g>
    <g transform="translate(216,80)">
      <rect width="180" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#1f3a5f">1,087</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Assigned</text>
    </g>
    <g transform="translate(408,80)">
      <rect width="180" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#2e7d32">88%</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Fill Rate</text>
    </g>
    <g transform="translate(600,80)">
      <rect width="180" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#2f6fb2">+46</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Projected Gains · 90 days</text>
    </g>
    <g transform="translate(792,80)">
      <rect width="184" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#b4530a">−72</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Projected Losses · 90 days</text>
    </g>
  </g>

  <!-- Left: grouped bar chart -->
  <g transform="translate(24,180)">
    <rect width="472" height="416" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#1f3a5f">Authorized vs. Assigned by Grade</text>
    <!-- legend -->
    <rect x="300" y="18" width="12" height="12" fill="#2f6fb2"/><text x="316" y="28" font-size="11" fill="#6b7280">Authorized</text>
    <rect x="386" y="18" width="12" height="12" fill="#4bb8a9"/><text x="402" y="28" font-size="11" fill="#6b7280">Assigned</text>
    <!-- axis -->
    <line x1="56" y1="60" x2="56" y2="372" stroke="#c9d2dc"/>
    <line x1="56" y1="372" x2="452" y2="372" stroke="#c9d2dc"/>
    <!-- bars: max 520 over 300px. y = 372 - v*0.577 -->
    <!-- groups centered every ~64px starting x=84 -->
    <g>
      <!-- E1-E4 520/470 -->
      <rect x="76" y="72"  width="20" height="300" fill="#2f6fb2"/>
      <rect x="98" y="101" width="20" height="271" fill="#4bb8a9"/>
      <text x="97" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">E1–E4</text>
      <!-- E5-E6 360/322 -->
      <rect x="140" y="164" width="20" height="208" fill="#2f6fb2"/>
      <rect x="162" y="186" width="20" height="186" fill="#4bb8a9"/>
      <text x="161" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">E5–E6</text>
      <!-- E7-E9 180/158 -->
      <rect x="204" y="268" width="20" height="104" fill="#2f6fb2"/>
      <rect x="226" y="281" width="20" height="91"  fill="#4bb8a9"/>
      <text x="225" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">E7–E9</text>
      <!-- WO 40/33 -->
      <rect x="268" y="349" width="20" height="23" fill="#2f6fb2"/>
      <rect x="290" y="353" width="20" height="19" fill="#4bb8a9"/>
      <text x="289" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">WO</text>
      <!-- CGO 90/74 -->
      <rect x="332" y="320" width="20" height="52" fill="#2f6fb2"/>
      <rect x="354" y="329" width="20" height="43" fill="#4bb8a9"/>
      <text x="353" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">CGO</text>
      <!-- FGO 50/30 -->
      <rect x="396" y="343" width="20" height="29" fill="#2f6fb2"/>
      <rect x="418" y="355" width="20" height="17" fill="#4bb8a9"/>
      <text x="417" y="388" font-size="10.5" fill="#6b7280" text-anchor="middle">FGO</text>
    </g>
  </g>

  <!-- Right: glide path line chart -->
  <g transform="translate(516,180)">
    <rect width="460" height="416" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#1f3a5f">Projected Strength — 6-Month Glide Path</text>
    <!-- target band (authorized) -->
    <rect x="56" y="80" width="380" height="26" fill="#eaf4ec"/>
    <line x1="56" y1="80" x2="436" y2="80" stroke="#8fca9b" stroke-dasharray="4 3"/>
    <text x="360" y="74" font-size="10.5" fill="#2e7d32">Authorized band</text>
    <!-- axes -->
    <line x1="56" y1="60" x2="56" y2="330" stroke="#c9d2dc"/>
    <line x1="56" y1="330" x2="436" y2="330" stroke="#c9d2dc"/>
    <!-- line: assigned strength across 6 months; y range ~1000-1120 mapped 330..70 -->
    <!-- pts x: 84,150,216,282,348,414 -->
    <polyline fill="none" stroke="#2f6fb2" stroke-width="2.5"
      points="84,150 150,164 216,190 282,214 348,178 414,158"/>
    <g fill="#2f6fb2">
      <circle cx="84" cy="150" r="4"/><circle cx="150" cy="164" r="4"/><circle cx="216" cy="190" r="4"/>
      <circle cx="282" cy="214" r="4"/><circle cx="348" cy="178" r="4"/><circle cx="414" cy="158" r="4"/>
    </g>
    <g font-size="10.5" fill="#6b7280" text-anchor="middle">
      <text x="84" y="348">Now</text><text x="150" y="348">+1mo</text><text x="216" y="348">+2mo</text>
      <text x="282" y="348">+3mo</text><text x="348" y="348">+4mo</text><text x="414" y="348">+5mo</text>
    </g>
    <text x="20" y="384" font-size="11" fill="#6b7280">Blends known + projected losses with inbound gains to project fill.</text>
  </g>

  <text x="24" y="612" font-size="11" fill="#9aa5b1">Power BI · snapshot star-schema model · Power Query ETL · DAX — representative sample data</text>
</svg>
