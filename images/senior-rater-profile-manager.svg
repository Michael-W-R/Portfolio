<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#eef1f5"/>

  <!-- Title bar -->
  <rect width="1000" height="64" fill="#243447"/>
  <text x="24" y="30" fill="#ffffff" font-size="21" font-weight="700">Senior Rater Profile Manager</text>
  <text x="24" y="50" fill="#9fb3c8" font-size="12.5">Illustrative dashboard · sample data · rules encoded from AR 623-3 / DA PAM 623-3</text>
  <g font-size="12" fill="#243447">
    <rect x="720" y="20" width="120" height="26" rx="4" fill="#ffffff"/><text x="732" y="37">Rank ▾  O-5</text>
    <rect x="848" y="20" width="128" height="26" rx="4" fill="#ffffff"/><text x="860" y="37">Form ▾  OER</text>
  </g>

  <!-- KPI cards -->
  <g>
    <g transform="translate(24,80)">
      <rect width="228" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#243447">34</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Reports Managed</text>
    </g>
    <g transform="translate(264,80)">
      <rect width="228" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#243447">14</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">Most Qualified (MQ) Given</text>
    </g>
    <g transform="translate(504,80)">
      <rect width="228" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#2e7d32">41%</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">MQ Rate  ·  limit &lt; 50%</text>
    </g>
    <g transform="translate(744,80)">
      <rect width="232" height="82" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
      <text x="16" y="34" font-size="26" font-weight="700" fill="#2f6fb2">2</text>
      <text x="16" y="58" font-size="12" fill="#6b7280">MQ Capacity Remaining</text>
    </g>
  </g>

  <!-- Left: profile gauge -->
  <g transform="translate(24,180)">
    <rect width="380" height="416" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#243447">Profile Standing — MQ Distribution</text>

    <!-- big dial-style bar -->
    <text x="190" y="130" font-size="58" font-weight="800" fill="#2e7d32" text-anchor="middle">41%</text>
    <text x="190" y="158" font-size="13" fill="#6b7280" text-anchor="middle">of reports rated Most Qualified</text>

    <!-- horizontal capacity bar -->
    <g transform="translate(30,210)">
      <rect width="320" height="26" rx="13" fill="#eef1f5"/>
      <rect width="262" height="26" rx="13" fill="#2e7d32"/>
      <!-- limit marker at 50% of scale (scale 0-62%, 50 -> 320*50/62=258) -->
      <line x1="258" y1="-6" x2="258" y2="32" stroke="#b4530a" stroke-width="2"/>
      <text x="258" y="-12" font-size="11" fill="#b4530a" text-anchor="middle">50% limit</text>
      <text x="0" y="52" font-size="11" fill="#9aa5b1">0%</text>
      <text x="320" y="52" font-size="11" fill="#9aa5b1" text-anchor="end">62%</text>
    </g>

    <g transform="translate(30,300)" font-size="12.5">
      <circle cx="6" cy="-4" r="5" fill="#2e7d32"/><text x="20" y="0" fill="#374151">Within regulation — 2 MQ of capacity remain</text>
      <circle cx="6" cy="24" r="5" fill="#2f6fb2"/><text x="20" y="28" fill="#374151">1 MQ used within the first four reports (rule met)</text>
      <circle cx="6" cy="52" r="5" fill="#9aa5b1"/><text x="20" y="56" fill="#374151">Promotable (P) reports scored vs. next-higher grade</text>
    </g>
  </g>

  <!-- Right: Would Process As table -->
  <g transform="translate(420,180)">
    <rect width="556" height="416" rx="8" fill="#ffffff" stroke="#dbe1e8"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#243447">Planned Ratings — "Would Process As"</text>
    <text x="20" y="50" font-size="11.5" fill="#6b7280">Sequenced check: does a planned rating misfire the profile?</text>

    <!-- header -->
    <g transform="translate(20,68)">
      <rect width="516" height="30" fill="#f4f6f8"/>
      <text x="12" y="20" font-size="12" font-weight="700" fill="#6b7280">RATED (SAMPLE)</text>
      <text x="230" y="20" font-size="12" font-weight="700" fill="#6b7280">PLANNED</text>
      <text x="340" y="20" font-size="12" font-weight="700" fill="#6b7280">WOULD PROCESS AS</text>
    </g>
    <!-- rows -->
    <g font-size="12.5" fill="#374151">
      <g transform="translate(20,98)">
        <text x="12" y="26">Officer A · MAJ</text><text x="230" y="26">MQ</text>
        <rect x="340" y="10" width="150" height="22" rx="11" fill="#e6f4ea"/><text x="352" y="26" fill="#2e7d32">✓  Processes as MQ</text>
        <line x1="0" y1="40" x2="516" y2="40" stroke="#eef1f5"/>
      </g>
      <g transform="translate(20,140)">
        <text x="12" y="26">Officer B · CPT</text><text x="230" y="26">MQ</text>
        <rect x="340" y="10" width="150" height="22" rx="11" fill="#e6f4ea"/><text x="352" y="26" fill="#2e7d32">✓  Processes as MQ</text>
        <line x1="0" y1="40" x2="516" y2="40" stroke="#eef1f5"/>
      </g>
      <g transform="translate(20,182)">
        <text x="12" y="26">Officer C · MAJ</text><text x="230" y="26">MQ</text>
        <rect x="340" y="10" width="182" height="22" rx="11" fill="#fbe9e0"/><text x="352" y="26" fill="#b4530a">⚠  Misfire — HQ (exceeds 50%)</text>
        <line x1="0" y1="40" x2="516" y2="40" stroke="#eef1f5"/>
      </g>
      <g transform="translate(20,224)">
        <text x="12" y="26">Officer D · LTC</text><text x="230" y="26">HQ</text>
        <rect x="340" y="10" width="150" height="22" rx="11" fill="#e6f4ea"/><text x="352" y="26" fill="#2e7d32">✓  Processes as HQ</text>
        <line x1="0" y1="40" x2="516" y2="40" stroke="#eef1f5"/>
      </g>
      <g transform="translate(20,266)">
        <text x="12" y="26">Officer E · MAJ</text><text x="230" y="26">HQ</text>
        <rect x="340" y="10" width="150" height="22" rx="11" fill="#e6f4ea"/><text x="352" y="26" fill="#2e7d32">✓  Processes as HQ</text>
      </g>
    </g>
    <text x="20" y="392" font-size="11" fill="#9aa5b1">Order-sensitive: the same ratings in a different sequence can change the result.</text>
  </g>

  <text x="24" y="612" font-size="11" fill="#9aa5b1">Power BI · Power Query source reconciliation by evaluation ID · ~2 dozen DAX measures — representative sample data</text>
</svg>
